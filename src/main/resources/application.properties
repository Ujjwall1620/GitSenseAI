spring.application.name=GitSenseAI
server.port=8082




# ==========================================
# MariaDB
# ==========================================
spring.datasource.url=jdbc:mariadb://localhost:3308/GitSenseAI?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.ai.vectorstore.mariadb.initialize-schema=true

# ==========================================
# JPA
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.show-sql=true

# ==========================================================
# Ollama
# ==========================================================
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=qwen2.5:3b
spring.ai.ollama.embedding.options.model=nomic-embed-text

# ==========================================================
# Repository Module
# ==========================================================
repository.workspace-base-dir=${java.io.tmpdir}/bug-hunter-workspaces
repository.github-api-base-url=https://api.github.com
repository.github-token=${GITHUB_TOKEN:}
repository.clone-depth=1
repository.max-repository-size-kb=512000

# ==========================================================
# Logging
# ==========================================================
logging.level.root=INFO
logging.level.com.bughunter=DEBUG
logging.level.org.eclipse.jgit=WARN
logging.level.org.springframework.web=INFO