spring.application.name=GitSenseAI
server.port=8082

#===================================
#mysql configuration
#===================================
spring.datasource.url=jdbc:mysql://localhost:3307/bughunter?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================
# JPA / Hibernate Configuration
# ==========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# ==========================
# Custom Repository Module Properties
# (bound to RepositoryProperties via @ConfigurationProperties(prefix = "repository"))
# ==========================
repository.workspace-base-dir=${java.io.tmpdir}/bug-hunter-workspaces
repository.github-api-base-url=https://api.github.com
repository.github-token=${GITHUB_TOKEN:}
repository.clone-depth=1
repository.max-repository-size-kb=512000

# ==========================
# Logging
# ==========================
logging.level.root=INFO
logging.level.com.bughunter=DEBUG
logging.level.org.eclipse.jgit=WARN
logging.level.org.springframework.web=INFO