spring.application.name=GitSenseAI
server.port=8082

# ==========================================================
# MySQL Datasource (Application Database)
# ==========================================================
mysql.datasource.url=jdbc:mysql://localhost:3307/bughunter?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
mysql.datasource.username=root
mysql.datasource.password=root
mysql.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================================
# MariaDB Datasource (Vector Store)
# ==========================================================
mariadb.datasource.url=jdbc:mariadb://localhost:3308/GitSenseAI?createDatabaseIfNotExist=true
mariadb.datasource.username=root
mariadb.datasource.password=root
mariadb.datasource.driver-class-name=org.mariadb.jdbc.Driver

# ==========================================================
# JPA
# ==========================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==========================================================
# Ollama
# ==========================================================
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=qwen3:8b
spring.ai.ollama.embedding.options.model=nomic-embed-text

# ==========================================================
# Repository Module
# ==========================================================
repository.workspace-base-dir=${java.io.tmpdir}/bug-hunter-workspaces
repository.github-api-base-url=https://api.github.com
repository.github-token=${GITHUB_TOKEN:}
repository.clone-depth=1
repository.max-repository-size-kb=512000

# ==========================================================
# Logging
# ==========================================================
logging.level.root=INFO
logging.level.com.bughunter=DEBUG
logging.level.org.eclipse.jgit=WARN
logging.level.org.springframework.web=INFO